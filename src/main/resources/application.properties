# HTTP server
quarkus.http.port=${HTTP_PORT:8080}
# Trust X-Forwarded-For headers set by a reverse proxy (e.g. NGINX)
quarkus.http.proxy.proxy-address-forwarding=true

# Database - production only; dev/test use Dev Services (auto-started via Testcontainers)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DATABASE_USER:lobby_user}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD:lobby_user}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_URL:localhost:5432/lobby_db}
%prod.quarkus.datasource.jdbc.min-size=8
%prod.quarkus.datasource.jdbc.max-size=32

# Run Flyway migrations automatically in tests (prod migrations are handled by the external Flyway container)
%test.quarkus.flyway.migrate-at-start=true
# Logging
quarkus.log.level=INFO

# --- Test profile overrides ---
# Suppress noisy WebSocket bus logs during tests
%test.quarkus.log.category."org.triplea.web.socket.WebSocketMessagingBus".level=OFF
# Dev Services: spin up a Postgres container automatically for tests
%test.quarkus.datasource.devservices.db-name=lobby_db
%test.quarkus.datasource.devservices.username=lobby_user
%test.quarkus.datasource.devservices.password=lobby_user
# Test clients connect directly without a reverse proxy, so no X-Forwarded-For header is sent.
# Disable IP enforcement so connections fall back to loopback instead of being rejected.
%test.app.websocket.ip-enforcing=false

# App-specific config (replaces LobbyServerConfig fields)
app.game-host-connectivity-check-enabled=${GAME_HOST_CONNECTIVITY_CHECK_ENABLED:false}
app.send-emails-enabled=${SEND_EMAILS_ENABLED:false}
app.smtp-host=${SMTP_HOST:172.17.0.1}
app.smtp-port=${SMTP_PORT:25}
app.log-sql-statements=false
