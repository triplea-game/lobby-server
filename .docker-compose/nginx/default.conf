server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Docker's embedded DNS. Used for the variable-based proxy_pass below so that
    # unresolved addresses do not abort NGINX startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /lobby {
      set $lobby_upstream lobby:8080;
      proxy_pass              http://$lobby_upstream;
      proxy_set_header        Host $host;
      proxy_set_header        X-Real-IP $remote_addr;
      proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_read_timeout  90;
    }

    location /lobby/game-connection/ws {
      set $lobby_upstream lobby:8080;
      proxy_pass              http://$lobby_upstream;
      proxy_http_version      1.1;
      proxy_set_header        Host $host;
      proxy_set_header        X-Real-IP $remote_addr;
      proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /lobby/player-connection/ws {
      set $lobby_upstream lobby:8080;
      proxy_pass              http://$lobby_upstream;
      proxy_http_version      1.1;
      proxy_set_header        Host $host;
      proxy_set_header        X-Real-IP $remote_addr;
      proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
}
