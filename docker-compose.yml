# This docker-compose file depends on './gradlew build'
#
# Launches all of the background servers used by TripleA.
# The main entrypoint to those services is NGINX which
# is listening on localhost:80
#
services:
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGUSER: postgres
    volumes:
      - ./.docker-compose/database/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: pg_isready -U lobby_user -d lobby_db
      interval: 1s
      retries: 10
      timeout: 3s
      start_period: 20s

  lobby:
    build:
      dockerfile: Dockerfile
    environment:
      - DATABASE_USER=lobby_user
      - DATABASE_PASSWORD=lobby_user
      - DB_URL=database:5432/lobby_db
      - SMTP_PORT=25
    ports:
      - "${LOBBY_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:stable
    volumes:
      - ./.docker-compose/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

  sample-data:
    image: postgres:18
    entrypoint: ["psql", "-h", "database", "-U", "lobby_user", "-d", "lobby_db", "-f", "/sample-data.sql"]
    environment:
      PGPASSWORD: lobby_user
    volumes:
      - ./database/sample_data/R__lobby_db_sample_data.sql:/sample-data.sql
    depends_on:
      lobby:
        condition: service_healthy
