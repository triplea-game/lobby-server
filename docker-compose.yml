# This docker-compose file depends on './gradlew shadowJar'
#
# Launches all of the background servers used by TripleA.
# The main entrypoint to those services is NGINX which
# is listening on localhost:80
#
services:
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGUSER: postgres
    volumes:
      - ./.docker-compose/database/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: pg_isready -U lobby_user -d lobby_db
      interval: 1s
      retries: 10
      timeout: 3s
      start_period: 20s

  sample-data:
    build:
      context: database/sample_data/
      dockerfile: Dockerfile
    command: >
      -locations=filesystem:/flyway/sql
      -connectRetries=60
      -user=lobby_user
      -password=lobby_user
      -url=jdbc:postgresql://database:5432/lobby_db
      migrate
    depends_on:
      lobby:
        condition: service_healthy
  lobby:
    build:
      dockerfile: Dockerfile
    volumes:
      - ./build/libs/lobby-server.jar:/lobby-server.jar
    environment:
      - DATABASE_USER=lobby_user
      - DATABASE_PASSWORD=lobby_user
      - DB_URL=database:5432/lobby_db
      - SMTP_PORT=25
    ports:
      - "${LOBBY_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
